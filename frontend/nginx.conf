# Production frontend: serve the built SPA and proxy /api + /hls to the backend
# and MediaMTX. NOTE: the backend port below (4102) must match PORT in .env.
# HLS is proxied through here (same-origin) so it rides the outer HTTPS domain
# and never hits Mixed Content — set MEDIAMTX_HLS_BASE=https://<domain>/hls.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → backend container on the compose network.
  location /api/ {
    proxy_pass http://backend:4102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # HLS live view → MediaMTX on the compose network (service name, so port 8888
  # need NOT be exposed to the host at all). Trailing slash on both sides maps
  # /hls/left/index.m3u8 → mediamtx:8888/left/index.m3u8. Streaming needs
  # buffering off + no-cache so hls.js always gets the live playlist/segments.
  location /hls/ {
    proxy_pass http://mediamtx:8888/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    add_header Cache-Control "no-cache" always;
  }

  # SPA fallback — every non-file route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
