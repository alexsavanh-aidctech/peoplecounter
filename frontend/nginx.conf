# Production frontend: serve the built SPA and proxy /api to the backend.
# NOTE: the backend port below (4102) must match PORT in .env. HLS is fetched by
# the browser directly from MEDIAMTX_HLS_BASE (server:8888), not proxied here.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → backend container on the compose network.
  location /api/ {
    proxy_pass http://backend:4102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # SPA fallback — every non-file route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
